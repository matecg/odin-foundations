<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="content">
    <h1>Rock Paper Scissors Game</h1>
    <div>
      <h2>SCORE</h2>
      <div class="score-container">
        <p>Player: <span class="player-score">0</span></p>
        <p>Computer: <span class="computer-score">0</span></p>
      </div>
    </div>
    <div class="buttons-container">
      <button><span class="opt-icon">🪨</span> ROCK</button>
      <button><span class="opt-icon">📃</span> PAPER</button>
      <button><span class="opt-icon">✂️</span> SCISSORS</button>
    </div>
    <div class="result-container">
      <p class="result result-min"></p>
      <button class="restart-btn">Restart</button>
    </div>
  </div>
  <script src="logic.js"></script>
</body>
</html>
